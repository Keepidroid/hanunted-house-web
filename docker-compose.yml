version: "3.9"

services:
  server:
    build: ./server
    container_name: hanunted-house-server
    environment:
      - SERVER_ADDR=:8080
# 一键启动所有服务（后续随着服务落地再补充具体配置）
services:
  server:
    build: ./server
    ports:
      - "8080:8080"

  web:
    build: ./web
    container_name: hanunted-house-web
    depends_on:
      - server
    ports:
      - "5173:80"
    ports:
      - "5173:5173"
    depends_on:
      - server
